name: payrogen_sdk
description: >-
  Non-custodial payment gateway SDK for Flutter. Wallet creation, split payments,
  escrow, card payments (Apple Pay, Google Pay), and crypto checkout.
version: 0.2.0
homepage: https://payrogen.com
repository: https://github.com/payrogen/payrogen_sdk
issue_tracker: https://github.com/payrogen/payrogen_sdk/issues
documentation: https://docs.payrogen.com
topics:
  - payments
  - solana
  - blockchain
  - escrow
  - wallet

environment:
  sdk: ^3.5.0
  flutter: '>=3.22.0'

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
